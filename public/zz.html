<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Drop</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Inter, system-ui, sans-serif;
      }

      body {
        background: #0b1120;
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 20px;
      }

      /* ambient glow */
      body::before,
      body::after {
        content: "";
        position: absolute;
        width: 380px;
        height: 380px;
        border-radius: 50%;
        filter: blur(120px);
        z-index: 0;
      }

      body::before {
        background: #2563eb;
        top: -120px;
        left: -120px;
        opacity: 0.18;
      }

      body::after {
        background: #7c3aed;
        bottom: -120px;
        right: -120px;
        opacity: 0.18;
      }

      .card {
        position: relative;
        z-index: 1;
        width: 430px;
        padding: 30px;
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(18px);
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.45),
          inset 0 1px 1px rgba(255, 255, 255, 0.04);
        animation: intro 0.7s ease;
      }

      @keyframes intro {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      h2 {
        font-size: 28px;
        margin-bottom: 10px;
        letter-spacing: -0.5px;
      }

      .subtitle {
        color: #94a3b8;
        font-size: 14px;
        margin-bottom: 28px;
      }

      .status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;

        padding: 14px 16px;
        border-radius: 16px;

        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);

        margin-bottom: 22px;

        transition: all 0.3s ease;
      }

      .status-left {
        display: flex;
        align-items: center;
        gap: 12px;

        min-width: 0;
        flex: 1;
      }

      .status-dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #facc15;
        flex-shrink: 0;

        animation: pulse 1.5s infinite;
      }

      .status-text {
        font-size: 14px;
        color: #dbeafe;

        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .status.ready .status-dot {
        background: #22c55e;
      }

      .status.locked .status-dot {
        background: #ef4444;
      }

      .status.uploading .status-dot {
        background: #38bdf8;
      }

      .status.success .status-dot {
        background: #22c55e;
        animation: pop 0.35s ease;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.7);
          opacity: 0.35;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes pop {
        0% {
          transform: scale(0.4);
        }
        100% {
          transform: scale(1);
        }
      }

      .action-btn,
      .send-btn {
        width: 100%;
        border: none;
        outline: none;
        border-radius: 16px;
        padding: 14px;
        font-size: 15px;
        font-weight: 600;
        color: white;
        cursor: pointer;
        transition: all 0.25s ease;
      }

      .action-btn {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35);
        margin-bottom: 20px;
      }

      .send-btn {
        margin-top: 14px;
        background: linear-gradient(135deg, #0ea5e9, #2563eb);
        box-shadow: 0 10px 25px rgba(14, 165, 233, 0.3);
      }

      button:hover {
        transform: translateY(-2px);
      }

      button:active {
        transform: scale(0.98);
      }

      #uploadBox {
        display: none;
        animation: reveal 0.35s ease;
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .file-input {
        width: 100%;
        padding: 14px;
        border-radius: 16px;
        border: 1px dashed rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.03);
        color: white;
        cursor: pointer;
        transition: 0.3s ease;
      }

      .file-input:hover {
        border-color: #60a5fa;
        background: rgba(96, 165, 250, 0.06);
      }

      .file-name {
        margin-top: 12px;
        font-size: 13px;
        color: #94a3b8;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .hidden {
        display: none;
      }

      .check-btn {
        border: none;
        outline: none;

        height: 36px;
        padding: 0 14px;

        border-radius: 12px;

        background: linear-gradient(135deg, #2563eb, #7c3aed);

        color: white;
        font-size: 13px;
        font-weight: 600;

        cursor: pointer;

        flex-shrink: 0;

        transition: 0.25s ease;

        box-shadow: 0 6px 18px rgba(37, 99, 235, 0.28);
      }

      .check-btn:hover {
        transform: translateY(-1px);
      }

      .check-btn:active {
        transform: scale(0.97);
      }
    </style>
  </head>

  <body>
    <div class="card">
      <!--     
    <div class="subtitle">
      Fast secure upload portal
    </div> -->

      <div id="status" class="status">
        <div class="status-left">
          <div class="status-dot"></div>
          <div class="status-text">Click check</div>
        </div>

        <button class="check-btn" onclick="checkStatus()">Check</button>
      </div>

      <!-- upload area -->
      <div id="uploadBox">
        <input type="file" id="file" class="file-input" />

        <div id="fileName" class="file-name hidden"></div>

        <button class="send-btn" onclick="send()">Send File</button>
      </div>
    </div>

    <script>
      const statusDiv = document.getElementById("status");
      const statusText = statusDiv.querySelector(".status-text");

      const uploadBox = document.getElementById("uploadBox");

      const fileInput = document.getElementById("file");
      const fileName = document.getElementById("fileName");

      // ========================
      // SAFE STATUS UPDATE
      // ========================
      function setStatus(message, type = "") {
        statusDiv.className = "status";

        if (type) {
          statusDiv.classList.add(type);
        }

        statusText.textContent = message;
      }

      // ========================
      // FILE NAME
      // ========================
      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];

        if (!file) {
          fileName.classList.add("hidden");
          return;
        }

        fileName.textContent = "Selected: " + file.name;
        fileName.classList.remove("hidden");
      });

      // ========================
      // CHECK RECEIVE STATUS
      // ========================
      async function checkStatus() {
        setStatus("Checking receiver status...");

        try {
          const res = await fetch("/receive-status", {
            method: "GET",
          });

          const data = await res.json();

          if (data.receiveMode) {
            setStatus("READY — Upload is enabled", "ready");

            uploadBox.style.display = "block";
          } else {
            setStatus("LOCKED — Waiting for access", "locked");

            uploadBox.style.display = "none";
          }
        } catch (err) {
          setStatus("Unable to connect to server", "locked");
        }
      }

      // ========================
      // SEND FILE
      // ========================
      async function send() {
        const file = fileInput.files[0];

        if (!file) {
          setStatus("Please select a file first", "locked");
          return;
        }

        const form = new FormData();
        form.append("file", file);

        setStatus("Uploading file...", "uploading");

        try {
          const res = await fetch("/zz", {
            method: "POST",
            body: form,
          });

          const data = await res.json();

          if (!data.success) {
            setStatus(data.message || "Upload failed", "locked");

            uploadBox.style.display = "none";
          } else {
            setStatus("Sent successfully", "success");
          }
        } catch (err) {
          setStatus("Network error occurred", "locked");
        }
      }
    </script>
  </body>
</html>
